name: Docs / Storybook Deploy

on:
  workflow_run:
    workflows: ["Release & Publish"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Builds react (slave) then core (hub with STORYBOOK_BUILD=true so refs use
      # relative paths), then assembles the hub's storybook-static/ by copying
      # each framework ref into it. STORYBOOK_SITE_BASE sets Vite's base path so
      # all asset URLs resolve under the /big-calendar/ GitHub Pages subpath.
      - name: Build and compose Storybook site
        run: pnpm exec nx run storybook-site:build
        env:
          STORYBOOK_BUILD: "true"
          STORYBOOK_SITE_BASE: /big-calendar/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/core/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
